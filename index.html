<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오성 연산 마스터 v3.1 - 오성중학교 기초 연산 집중 학습</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
<style>
:root {
  --bg1: #0B0D1A; --bg2: #111328; --bg3: #181B35;
  --card: rgba(255,255,255,0.04); --border: rgba(255,255,255,0.07);
  --text: #E2E0EF; --sub: #7A7896;
  --accent: #6C63FF; --accent2: #FF6B6B;
  --gold: #FFD93D; --green: #2ED573;
  --orange: #FF9F43; --pink: #FD79A8;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif;
  background: linear-gradient(160deg, var(--bg1), var(--bg2), var(--bg3));
  color: var(--text); min-height: 100vh;
}
.wrap { max-width: 880px; margin: 0 auto; padding: 12px 16px; }
.card {
  background: var(--card); border-radius: 18px; padding: 22px;
  border: 1px solid var(--border); backdrop-filter: blur(10px);
  margin-bottom: 14px; transition: transform 0.2s;
}
.card:hover { transform: translateY(-1px); }
.btn {
  padding: 11px 24px; border: none; border-radius: 12px; cursor: pointer;
  font-size: 14px; font-weight: 700; color: #fff; font-family: inherit;
  background: linear-gradient(135deg, var(--accent), rgba(108,99,255,0.7));
  box-shadow: 0 4px 14px rgba(108,99,255,0.25); transition: all 0.15s;
}
.btn:hover { filter: brightness(1.12); transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-green { background: linear-gradient(135deg, var(--green), rgba(46,213,115,0.7)); box-shadow: 0 4px 14px rgba(46,213,115,0.25); }
.btn-red { background: linear-gradient(135deg, var(--accent2), rgba(255,107,107,0.7)); box-shadow: 0 4px 14px rgba(255,107,107,0.25); }
.btn-orange { background: linear-gradient(135deg, var(--orange), rgba(255,159,67,0.7)); box-shadow: 0 4px 14px rgba(255,159,67,0.25); }
.btn-gray { background: linear-gradient(135deg, #555, #444); box-shadow: 0 4px 14px rgba(0,0,0,0.2); }
.btn-sm { padding: 7px 14px; font-size: 12px; border-radius: 9px; }
.btn-full { width: 100%; }
.input {
  width: 100%; padding: 14px 16px; border: 2px solid var(--border);
  border-radius: 14px; font-size: 20px; font-weight: 700; text-align: center;
  background: rgba(255,255,255,0.06); color: #fff; outline: none;
  font-family: 'Pretendard', monospace; transition: border-color 0.3s;
}
.input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.15); }
.input-sm { font-size: 14px; padding: 10px 14px; text-align: left; }
select.input { appearance: auto; cursor: pointer; }
.tag {
  display: inline-block; padding: 3px 9px; border-radius: 7px;
  font-size: 11px; font-weight: 700;
}
.pbar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); position: relative; overflow: hidden; }
.pfill {
  position: absolute; top: 0; left: 0; height: 100%; border-radius: 3px;
  transition: width 0.4s ease;
}
.nav {
  display: flex; gap: 3px; background: rgba(255,255,255,0.04); border-radius: 14px;
  padding: 3px; margin-bottom: 16px; border: 1px solid var(--border);
}
.nav-btn {
  flex: 1; padding: 9px 6px; border: none; border-radius: 11px; cursor: pointer;
  font-size: 12px; font-weight: 500; background: transparent; color: var(--sub);
  font-family: inherit; transition: all 0.2s;
}
.nav-btn.active { background: rgba(108,99,255,0.2); color: var(--accent); font-weight: 700; }
.grid { display: grid; gap: 10px; }
.grid-2 { grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); }
.grid-4 { grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); }
.flex { display: flex; }
.flex-wrap { flex-wrap: wrap; }
.gap-8 { gap: 8px; }
.gap-10 { gap: 10px; }
.gap-12 { gap: 12px; }
.items-center { align-items: center; }
.justify-between { justify-content: space-between; }
.text-center { text-align: center; }
.mb-4 { margin-bottom: 4px; }
.mb-8 { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mt-8 { margin-top: 8px; }
.mt-16 { margin-top: 16px; }
.hidden { display: none !important; }

.module-card {
  border-radius: 16px; padding: 18px; cursor: pointer; transition: all 0.25s;
}
.module-card:hover { transform: translateY(-3px); }

.question-box {
  font-size: 26px; font-weight: 900; text-align: center; padding: 30px 16px;
  background: rgba(255,255,255,0.03); border-radius: 16px;
  font-family: 'Pretendard', 'Courier New', monospace; line-height: 1.5;
  word-break: break-word;
}

.popup-overlay {
  position: fixed; inset: 0; z-index: 999; display: flex;
  align-items: center; justify-content: center;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(6px);
}
.popup-box {
  background: var(--bg2); border-radius: 22px; padding: 36px; text-align: center;
  max-width: 340px; width: 90%; border: 2px solid rgba(108,99,255,0.3);
  box-shadow: 0 20px 60px rgba(108,99,255,0.2);
  animation: pop 0.4s ease;
}

.review-item {
  padding: 9px 12px; margin-bottom: 4px; border-radius: 10px; font-size: 13px;
  border-left: 3px solid;
}
.review-ok { background: rgba(46,213,115,0.04); border-color: var(--green); }
.review-fail { background: rgba(255,107,107,0.04); border-color: var(--accent2); }

.timer-bar {
  height: 4px; border-radius: 2px; background: rgba(255,255,255,0.08);
  margin-bottom: 12px; overflow: hidden;
}
.timer-fill {
  height: 100%; border-radius: 2px; transition: width 0.1s linear;
}

.section-divider {
  margin: 8px 0 10px; display: flex; align-items: center; gap: 8px;
}
.section-divider span { font-size: 13px; font-weight: 800; white-space: nowrap; }
.section-divider .line { flex: 1; height: 1px; }

.stat-box {
  text-align: center; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 12px;
}
.stat-icon { font-size: 22px; }
.stat-val { font-size: 20px; font-weight: 800; margin-top: 2px; }
.stat-label { font-size: 10px; color: var(--sub); }

.wrong-note-item {
  padding: 14px; border-radius: 14px; background: rgba(255,255,255,0.03);
  border: 1px solid var(--border); margin-bottom: 8px;
}

.admin-table {
  width: 100%; border-collapse: collapse; font-size: 12px;
}
.admin-table th {
  padding: 10px 8px; text-align: left; color: var(--sub); font-weight: 600;
  border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 11px;
}
.admin-table td {
  padding: 10px 8px; border-bottom: 1px solid rgba(255,255,255,0.04);
}

@keyframes pop { from { transform: scale(0.5); opacity:0 } to { transform: scale(1); opacity:1 } }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }

/* 인쇄 스타일 */
@media print {
  body { background: #fff !important; color: #000 !important; }
  .wrap { max-width: 100%; padding: 20px; }
  .card { background: #fff !important; border: 1px solid #ddd !important; backdrop-filter: none !important; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
  .tag { background: #eee !important; color: #333 !important; }
  .question-box { background: #f5f5f5 !important; color: #000 !important; }
  .wrong-note-item { background: #fafafa !important; border: 1px solid #ddd !important; color: #000 !important; }
  .stat-box { background: #f5f5f5 !important; }
  * { color: #000 !important; }
  .pfill { background: #666 !important; }
  .pbar { background: #ddd !important; }
}
.print-only { display: none; }

/* 손글씨 캔버스 */
.canvas-wrap {
  position: relative; border-radius: 14px; overflow: hidden;
  border: 2px solid var(--border); background: rgba(255,255,255,0.06);
  margin-bottom: 12px; transition: border-color 0.3s;
}
.canvas-wrap.active { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(108,99,255,0.12); }
.draw-canvas {
  display: block; width: 100%; touch-action: none;
  cursor: crosshair; background: transparent;
}
.canvas-toolbar {
  display: flex; align-items: center; gap: 6px; padding: 8px 12px;
  background: rgba(255,255,255,0.03); border-top: 1px solid var(--border);
  flex-wrap: wrap;
}
.pen-btn {
  width: 32px; height: 32px; border-radius: 8px; border: 2px solid transparent;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  font-size: 14px; background: rgba(255,255,255,0.06); color: var(--text);
  font-family: inherit; transition: all 0.15s;
}
.pen-btn:hover { background: rgba(255,255,255,0.12); }
.pen-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.15); }
.pen-size {
  width: 10px; height: 10px; border-radius: 50%; background: var(--text);
}
.pen-size.sz-1 { width: 6px; height: 6px; }
.pen-size.sz-3 { width: 12px; height: 12px; }
.pen-size.sz-5 { width: 16px; height: 16px; }
.input-mode-toggle {
  display: flex; background: rgba(255,255,255,0.04); border-radius: 10px;
  padding: 2px; border: 1px solid var(--border); margin-bottom: 12px;
}
.mode-btn {
  flex: 1; padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer;
  font-size: 12px; font-weight: 600; background: transparent; color: var(--sub);
  font-family: inherit; transition: all 0.2s;
}
.mode-btn.active {
  background: rgba(108,99,255,0.2); color: var(--accent); font-weight: 700;
}
.canvas-grid {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; opacity: 0.08;
}

/* 분수 시각 표기 */
.mf {
  display: inline-flex; flex-direction: column; align-items: center;
  vertical-align: middle; margin: 0 3px; position: relative;
  font-size: 0.85em; line-height: 1.1;
}
.mf .fn { border-bottom: 1.5px solid currentColor; padding: 0 4px 2px; min-width: 16px; text-align: center; }
.mf .fd { padding: 2px 4px 0; min-width: 16px; text-align: center; }
.mf-neg { margin-right: 1px; }
.mf-paren { vertical-align: middle; font-size: 1.1em; }
.question-box .mf { font-size: 0.7em; }
.question-box { display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 6px; }
</style>
</head>
<body>

<div class="wrap" id="app"></div>

<script>
// ═══════════════════════════════════════════════════════════════
// 🔢 오성 연산 마스터 v3.1 — GitHub Pages 배포용
// ═══════════════════════════════════════════════════════════════

// ── 유틸리티 ──
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);
const rand = (a,b) => Math.floor(Math.random()*(b-a+1))+a;
const pick = a => a[Math.floor(Math.random()*a.length)];
const gcd = (a,b) => { a=Math.abs(a); b=Math.abs(b); while(b){[a,b]=[b,a%b]} return a; };
const lcm = (a,b) => Math.abs(a*b)/gcd(a,b);
const simplify = (n,d) => { if(d===0) return [n,1]; const s=d<0?-1:1; const g=gcd(Math.abs(n),Math.abs(d)); return [s*n/g, s*d/g]; };
const fmtFrac = (n,d) => { if(d===1) return `${n}`; if(n===0) return "0"; return `${n}/${d}`; };

// ── 분수 시각화 렌더링 ──
function mathDisplay(expr) {
  let s = expr;
  // 대분수: 1과2/3
  s = s.replace(/(\d+)과\s*(\d+)\/(\d+)/g, function(_,w,n,d){
    return w+'<span class="mf"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>';
  });
  // 괄호 안 양수 분수: (+2/3)
  s = s.replace(/\(\+(\d+)\/(\d+)\)/g, function(_,n,d){
    return '<span class="mf-paren">(</span><span class="mf-neg">+</span><span class="mf"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span><span class="mf-paren">)</span>';
  });
  // 괄호 안 음수 분수: (-2/3)
  s = s.replace(/\(\-(\d+)\/(\d+)\)/g, function(_,n,d){
    return '<span class="mf-paren">(</span><span class="mf-neg">−</span><span class="mf"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span><span class="mf-paren">)</span>';
  });
  // 괄호 안 양수 정수: (+3)
  s = s.replace(/\(\+(\d+)\)/g, function(_,n){
    return '<span class="mf-paren">(</span>+'+n+'<span class="mf-paren">)</span>';
  });
  // 독립 음수 분수 (맨 앞): -2/3
  s = s.replace(/(^|[=\s])-(\d+)\/(\d+)/g, function(_,pre,n,d){
    return pre+'−<span class="mf"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>';
  });
  // 일반 분수: 2/3 (아직 변환 안 된 것)
  s = s.replace(/(?<![<\w>])(\d+)\/(\d+)(?![<\w])/g, function(_,n,d){
    return '<span class="mf"><span class="fn">'+n+'</span><span class="fd">'+d+'</span></span>';
  });
  return s;
}

// ── 모듈 정의 ──
const MODULES = [
  { id:"natural", name:"자연수 사칙연산", icon:"🔢", color:"#FF6B35", grade:"초5~6", desc:"큰 수의 덧셈·뺄셈·곱셈·나눗셈", levels:["두 자리 수 연산","세 자리 수 연산","큰 수 곱셈·나눗셈","복합 연산","괄호가 있는 식"] },
  { id:"factor", name:"약수와 배수", icon:"🎯", color:"#E84393", grade:"초5~6", desc:"약수·배수·최대공약수·최소공배수", levels:["약수 구하기","배수 구하기","최대공약수(GCD)","최소공배수(LCM)","GCD·LCM 응용"] },
  { id:"fraction", name:"분수의 연산", icon:"🍕", color:"#00B894", grade:"초5~6", desc:"진분수·대분수의 사칙연산", levels:["동분모 덧셈·뺄셈","이분모 덧셈·뺄셈","분수의 곱셈","분수의 나눗셈","대분수 혼합 연산"] },
  { id:"decimal", name:"소수의 연산", icon:"🔬", color:"#0984E3", grade:"초5~6", desc:"소수의 덧셈·뺄셈·곱셈·나눗셈", levels:["소수 한 자리 덧뺄","소수 두 자리 덧뺄","소수의 곱셈","소수의 나눗셈","소수↔분수 변환"] },
  { id:"mixed", name:"혼합 계산", icon:"⚡", color:"#6C5CE7", grade:"초5~중1", desc:"사칙연산 순서와 괄호 계산", levels:["연산 순서","괄호가 있는 식","여러 괄호","분수·소수 혼합","복잡한 혼합식"] },
  { id:"integer", name:"정수의 연산", icon:"🌡️", color:"#FD79A8", grade:"중1", desc:"양수·음수·절댓값·정수 사칙연산", levels:["양수와 음수","절댓값","정수 덧뺄 (괄호 표기)","정수 덧뺄 (생략 표기)","정수 곱셈·나눗셈","정수 혼합 연산"] },
  { id:"rational", name:"유리수의 연산", icon:"🧪", color:"#00CEC9", grade:"중1", desc:"음의 분수·소수 포함 유리수 연산", levels:["유리수 대소비교","유리수 덧뺄 (괄호 표기)","유리수 덧뺄 (생략 표기)","유리수 곱셈","유리수 나눗셈","유리수 복합 연산"] },
  { id:"power", name:"거듭제곱", icon:"💥", color:"#A29BFE", grade:"중1~2", desc:"거듭제곱과 지수법칙", levels:["거듭제곱 계산","밑이 음수","지수법칙 기초","지수법칙 응용","종합 문제"] },
];

const BADGES = [
  { id:"first", name:"첫 발걸음", icon:"👣", desc:"첫 문제 풀기", cond:s=>s.total>=1 },
  { id:"s3", name:"3일 연속", icon:"🔥", desc:"3일 연속 학습", cond:s=>s.streak>=3 },
  { id:"s7", name:"불꽃 학습자", icon:"💪", desc:"7일 연속 학습", cond:s=>s.streak>=7 },
  { id:"p10", name:"완벽한 10", icon:"💯", desc:"10문제 연속 정답", cond:s=>s.maxConsec>=10 },
  { id:"t50", name:"풀이왕", icon:"📚", desc:"50문제 풀기", cond:s=>s.total>=50 },
  { id:"t100", name:"100문제 달성", icon:"🏆", desc:"100문제", cond:s=>s.total>=100 },
  { id:"t200", name:"연산 달인", icon:"🌟", desc:"200문제", cond:s=>s.total>=200 },
  { id:"lv5", name:"레벨 5", icon:"⭐", desc:"레벨 5 도달", cond:s=>s.level>=5 },
  { id:"lv10", name:"수학 챔피언", icon:"👑", desc:"레벨 10 도달", cond:s=>s.level>=10 },
  { id:"allmod", name:"올라운더", icon:"🎪", desc:"모든 모듈 도전", cond:s=>MODULES.every(m=>(s.modSolved[m.id]||0)>=1) },
  { id:"timer", name:"속도왕", icon:"⏱️", desc:"타이머 모드 완료", cond:s=>s.timerComplete>=1 },
  { id:"note30", name:"복습왕", icon:"📝", desc:"오답노트 30문제 복습", cond:s=>s.noteReviewed>=30 },
];

// ── 문제 생성 엔진 ──
function genProblem(mod, lv) {
  const fmt = n => n<0?`(${n})`:`${n}`;
  const sup = n => String(n).split('').map(d=>'⁰¹²³⁴⁵⁶⁷⁸⁹'[d]).join('');

  if(mod==="natural") {
    if(lv===1){ const op=pick(["+","-","×","÷"]); let a,b,ans; if(op==="+"){a=rand(11,99);b=rand(11,99);ans=a+b} else if(op==="-"){a=rand(30,99);b=rand(10,a-1);ans=a-b} else if(op==="×"){a=rand(2,9);b=rand(11,30);ans=a*b} else{b=rand(2,9);ans=rand(3,15);a=b*ans} return{q:`${a} ${op} ${b}`,a:String(ans),h:`차근차근 ${op==="×"?"곱셈":op==="÷"?"나눗셈":op==="+"?"덧셈":"뺄셈"}을 계산하세요`}; }
    if(lv===2){ const op=pick(["+","-","×"]); let a,b,ans; if(op==="+"){a=rand(100,999);b=rand(100,999);ans=a+b} else if(op==="-"){a=rand(300,999);b=rand(100,a);ans=a-b} else{a=rand(11,99);b=rand(11,50);ans=a*b} return{q:`${a} ${op} ${b}`,a:String(ans),h:"자릿수를 맞춰 계산하세요"}; }
    if(lv===3){ if(pick([0,1])){const a=rand(12,50),b=rand(12,50);return{q:`${a} × ${b}`,a:String(a*b),h:"분배법칙: "+a+"×"+b}} else{const b=rand(11,30),ans=rand(10,40),a=b*ans;return{q:`${a} ÷ ${b}`,a:String(ans),h:b+"× ? = "+a}} }
    if(lv===4){ const a=rand(10,30),b=rand(2,9),c=rand(5,20); const t=pick([0,1]); if(t===0){return{q:`${a} + ${b} × ${c}`,a:String(a+b*c),h:"곱셈 먼저!"}} else{return{q:`${a*b} - ${b} × ${c}`,a:String(a*b-b*c),h:"곱셈 먼저 → 뺄셈"}} }

    if(lv===4){ const b=pick([2,4,5,8]),ans=+(rand(11,50)/10).toFixed(1),a=parseFloat((ans*b).toFixed(1)); return{q:`${a} ÷ ${b}`,a:parseFloat(ans.toFixed(2)).toString(),h:"나눗셈 소수점 위치 주의"}; }

    const fmtR = (n,d,isFirst) => {

      const d1=pick([2,3,4,5,6]),d2=pick([2,3,4,5,6]),n1=rand(1,d1-1)*pick([1,-1]),n2=rand(1,d2-1)*pick([1,-1]),op=pick(["+","-"]),cd=lcm(d1,d2); const rn=op==="+"?n1*(cd/d1)+n2*(cd/d2):n1*(cd/d1)-n2*(cd/d2); const[sn,sd]=simplify(rn,cd);
      let qs; if(n2<0){qs=`${fmtFrac(n1,d1)} ${op} (${fmtFrac(n2,d2)})`} else{qs=`${fmtFrac(n1,d1)} ${op} ${fmtFrac(n2,d2)}`}

// ── 학교 데이터 (학생 명단) ──
function getSchool() {
  try {
    const s = localStorage.getItem('cm_school');
    if(s) return JSON.parse(s);
  } catch{}
  return { students: [], adminPw: ADMIN_PW };
}
function saveSchool(school) {
  try { localStorage.setItem('cm_school', JSON.stringify(school)); } catch{}
}

// ── 학생별 데이터 저장/로드 ──
function stuKey(g,c,n) { return `cm_stu_${g}_${c}_${n}`; }

function saveData() {
  if(!data.grade) return;
  try { localStorage.setItem(stuKey(data.grade, data.cls, data.number), JSON.stringify(data)); } catch{}
}
function loadStudentData(g,c,n) {
  try {
    const s = localStorage.getItem(stuKey(g,c,n));
    if(s) return {...initData(), ...JSON.parse(s)};
  } catch{}
  return null;
}

// ── 전체 학생 랭킹 데이터 수집 ──
function getAllStudentData() {
  const school = getSchool();
  const results = [];
  school.students.forEach(st => {
    const d = loadStudentData(st.grade, st.cls, st.number);
    results.push({
      name: st.name, grade: st.grade, cls: st.cls, number: st.number,
      xp: d ? d.xp : 0, level: d ? getLv(d.xp).level : 1,
      total: d ? d.total : 0, correct: d ? d.correct : 0,
      streak: d ? d.streak : 0, wrongs: d ? (d.wrongNotes||[]).length : 0,
      lastDate: d ? d.lastDate : '-',
      acc: d && d.total>0 ? Math.round(d.correct/d.total*100) : 0,
      modSolved: d ? d.modSolved||{} : {},
      modCorrect: d ? d.modCorrect||{} : {},
      badges: d ? d.badges||[] : [],
    });
  });
  return results;
}

// ── 레벨 ──
function xpFor(lv) { return lv*80+(lv-1)*40; }
function getLv(xp) { let lv=1,t=0; while(t+xpFor(lv)<=xp){t+=xpFor(lv);lv++} return{level:lv,cur:xp-t,need:xpFor(lv)}; }

// ── 출석 ──
function checkStreak() {
  const today = new Date().toISOString().slice(0,10);
  if(data.lastDate===today) return;
  const yday = new Date(Date.now()-86400000).toISOString().slice(0,10);
  data.streak = data.lastDate===yday ? data.streak+1 : 1;
  data.lastDate = today;
}

      </div>`;
    }
    if(state.view==='home') html += renderHome(lv, acc);
    else if(state.view==='module') html += renderModule();
    else if(state.view==='quiz') html += renderQuiz();
    else if(state.view==='result') html += renderResult();
    else if(state.view==='profile') html += renderProfile(lv, acc);
    else if(state.view==='wrong') html += renderWrong();
    else if(state.view==='wrongNote') html += renderWrongNote();
    else if(state.view==='wrongReview') html += renderWrongReview();
    else if(state.view==='rank') html += renderRank(lv);
  }

  html += `<div class="text-center no-print" style="padding:20px 0 12px;font-size:10px;color:#333">
    오성 연산 마스터 v3.1 · 오성중학교 기초학력 향상 프로그램 · © 2026 Developed by K.G.B</div>`;

  app.innerHTML = html;

  // 퀴즈 입력 포커스
  if(state.view==='quiz' || state.view==='wrongReview') {
    const inp = $('#quiz-input');
    if(inp && !state.fb) setTimeout(()=>inp.focus(), 50);
    // 캔버스 초기화
    if(state.inputMode==='handwrite' && !state.fb) {
      setTimeout(()=>initCanvas(), 60);
    }
  }
}

function go(view) {
  if(state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval=null; }
  state.view = view;

}

function loginStudent() {
  const school = getSchool();
  const g = state.selGrade, c = state.selClass, n = state.selNumber;
  const pw = ($('#stu-pw')||{}).value;
  if(!n) { $('#login-error').textContent = '이름을 선택하세요.'; return; }
  if(!pw) { $('#login-error').textContent = '비밀번호를 입력하세요.'; return; }
  const stu = school.students.find(s=>s.grade===g && s.cls===c && s.number===n);
  if(!stu) { $('#login-error').textContent = '학생 정보를 찾을 수 없습니다.'; return; }
  if((stu.pw||DEFAULT_STU_PW) !== pw) { $('#login-error').textContent = '❌ 비밀번호가 틀렸습니다.'; return; }

  // 로그인 성공
  const existing = loadStudentData(g, c, n);
  if(existing) {
    data = existing;
  } else {
    data = initData();
    data.name = stu.name;
    data.grade = g; data.cls = c; data.number = n;
    data.joinDate = new Date().toISOString().slice(0,10);
  }
  data.name = stu.name; data.grade=g; data.cls=c; data.number=n;
  checkStreak();
  saveData();
  state.loggedIn = true; state.isAdmin = false; state.view = 'home';
  render();
}

function loginAdmin() {
  const pw = ($('#admin-pw')||{}).value;
  const school = getSchool();
  if(pw !== (school.adminPw || ADMIN_PW)) { $('#login-error').textContent = '❌ 비밀번호가 틀렸습니다.'; return; }
  state.loggedIn = true; state.isAdmin = true; state.view = 'adminStudents';
  render();
}

function logout() {
  state.loggedIn = false; state.isAdmin = false; state.view = 'login';
  state.loginTab = 'student'; state.selNumber = '';
  data = initData();
  render();
}

// ── 퀴즈 시작 ──
function startQuiz() {
  state.quiz = { cur:0, tot:10, ok:0, results:[] };
  state.fb = null; state.hint = false; state.ans = '';
  state.canvasHistory = [];
  state.prob = genProblem(state.curMod, state.level);
  state.timerLeft = state.timerSec;
  state.view = 'quiz';
  render();
  if(state.timerMode) startTimer();
}

function startTimer() {
  if(state.timerInterval) clearInterval(state.timerInterval);
  state.timerLeft = state.timerSec;
  state.timerInterval = setInterval(() => {
    state.timerLeft -= 0.1;
    const bar = $('#timer-bar-fill');
    if(bar) bar.style.width = (state.timerLeft/state.timerSec*100)+'%';
    const txt = $('#timer-text');
    if(txt) txt.textContent = Math.ceil(state.timerLeft)+'초';
    if(state.timerLeft <= 0) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
      submitAnswer(true);
    }
  }, 100);
}

// ── 퀴즈 렌더 ──
function renderQuiz() {
  const m = MODULES.find(x=>x.id===state.curMod);
  if(!m || !state.prob) return '';
  const pct = state.quiz.cur/state.quiz.tot*100;

  let h = `<div class="card" style="padding:14px">
    <div class="flex justify-between mb-8">
      <span style="font-size:12px;color:var(--sub)">${m.icon} ${m.name} · 단계 ${state.level}${state.timerMode?' · ⏱️ 타이머':''}</span>
      <span style="font-size:12px;font-weight:700">${state.quiz.cur}/${state.quiz.tot} · ✅ ${state.quiz.ok}</span>
    </div>
    <div class="pbar"><div class="pfill" style="width:${pct}%;background:linear-gradient(90deg,${m.color},${m.color}99)"></div></div>
  </div>`;

  h += `<div class="card" style="padding:28px;border-color:${state.fb?(state.fb.ok?'rgba(46,213,115,0.3)':'rgba(255,107,107,0.3)'):'var(--border)'};transition:border-color 0.3s">`;

  // 타이머 바
  if(state.timerMode && !state.fb) {
    const pct = state.timerLeft/state.timerSec*100;
    const color = pct > 50 ? 'var(--green)' : pct > 20 ? 'var(--orange)' : 'var(--accent2)';
    h += `<div class="flex justify-between mb-4">
      <span style="font-size:11px;color:var(--sub)">⏱️ 남은 시간</span>
      <span id="timer-text" style="font-size:12px;font-weight:700;color:${color}">${Math.ceil(state.timerLeft)}초</span>
    </div>
    <div class="timer-bar"><div class="timer-fill" id="timer-bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
  }

  h += `<div class="flex justify-between mb-16">
    <span style="font-size:12px;color:var(--sub)">문제 ${state.quiz.cur+(state.fb?0:1)}</span>
    <span class="tag" style="background:${m.color}22;color:${m.color}">${'⭐'.repeat(state.level)}</span>
  </div>
  <div class="question-box mb-20">${mathDisplay(state.prob.q)}${state.prob.q.includes('?')?'':' = ?'}</div>`;

  if(state.hint) {
    h += `<div style="background:rgba(255,217,61,0.06);border:1px solid rgba(255,217,61,0.2);border-radius:12px;padding:11px 14px;margin-bottom:14px;font-size:13px;color:var(--gold)">💡 ${state.prob.h}</div>`;
  }

  // 입력 모드 토글
  if(!state.fb) {
    h += `<div class="input-mode-toggle">
      <button class="mode-btn ${state.inputMode==='keyboard'?'active':''}" onclick="switchInputMode('keyboard')">⌨️ 키보드 입력</button>
      <button class="mode-btn ${state.inputMode==='handwrite'?'active':''}" onclick="switchInputMode('handwrite')">✏️ 손글씨 풀이</button>
    </div>`;
  }

// ── 답 제출 ──
function submitAnswer(timedOut) {
  if(state.fb) return;
  if(state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval=null; }

  const userAns = (state.ans||'').trim();
  const normalize = s => s.replace(/\s/g,'').replace(/\+/g,'');
  const isOk = !timedOut && userAns && normalize(userAns) === normalize(state.prob.a);
  const xpG = isOk ? (8 + state.level*4 + (state.hint?0:4) + (state.timerMode?5:0)) : 2;

  state.fb = { ok:isOk, xp:xpG };
  const r = { ok:isOk, q:state.prob.q, ua:timedOut?'(시간초과)':userAns, ca:state.prob.a, h:state.prob.h, mod:state.curMod, lv:state.level, date:new Date().toISOString().slice(0,10) };
  state.quiz.results.push(r);
  state.quiz.cur++;
  if(isOk) state.quiz.ok++;

  checkStreak();
  data.xp += xpG;
  data.total++;
  if(isOk) { data.correct++; data.consec++; } else { data.consec = 0; }
  data.maxConsec = Math.max(data.maxConsec, data.consec);
  data.modSolved[state.curMod] = (data.modSolved[state.curMod]||0)+1;
  if(isOk) data.modCorrect[state.curMod] = (data.modCorrect[state.curMod]||0)+1;
  data.level = getLv(data.xp).level;

  // 오답노트 저장
  if(!isOk) {
    data.wrongNotes.unshift(r);
    if(data.wrongNotes.length > 200) data.wrongNotes = data.wrongNotes.slice(0, 200);
  }

  // 뱃지
  checkBadges();
  saveData();
  render();
}

function checkBadges() {
  BADGES.forEach(b => {
    if(!data.badges.includes(b.id) && b.cond(data)) {
      data.badges.push(b.id);
      setTimeout(() => showBadgePopup(b), 300);
    }
  });
}

function showBadgePopup(b) {
  const ol = document.createElement('div');
  ol.className = 'popup-overlay';
  ol.onclick = () => ol.remove();
  ol.innerHTML = `<div class="popup-box" onclick="event.stopPropagation()">
    <div style="font-size:64px;margin-bottom:12px">${b.icon}</div>
    <div style="font-size:11px;color:var(--accent);font-weight:700;letter-spacing:2px">🎉 새 뱃지!</div>
    <div style="font-size:20px;font-weight:900;margin-top:6px">${b.name}</div>
    <div style="color:var(--sub);font-size:13px;margin-top:4px">${b.desc}</div>
    <button class="btn mt-16" onclick="this.closest('.popup-overlay').remove()">확인</button>
  </div>`;
  document.body.appendChild(ol);
}

// ── 다음 문제 ──
function nextProblem() {
  if(state.quiz.cur >= state.quiz.tot) {
    if(state.timerMode) data.timerComplete = (data.timerComplete||0)+1;
    saveData();
    go('result');
    return;
  }
  state.fb = null; state.hint = false; state.ans = '';
  state.canvasHistory = [];
  state.prob = genProblem(state.curMod, state.level);
  state.timerLeft = state.timerSec;
  render();
  if(state.timerMode) startTimer();
}

  const notes = data.wrongNotes || [];

  const shuffled = [...notes].sort(() => Math.random()-0.5);

    <div style="font-size:11px;color:var(--sub);margin-bottom:8px;text-align:center">✏️ 풀이 과정을 쓰고, 아래에 최종 답을 입력하세요</div>`;
  }

  h += `<input class="input ${state.inputMode==='handwrite'?'input-sm':''} mb-12" id="quiz-input" placeholder="${state.inputMode==='handwrite'?'최종 정답 입력':'정답 입력'}"
    value="${state.ans}" oninput="state.ans=this.value"
    onkeydown="if(event.key==='Enter'){state.fb?nextWrongReview():submitWrongReview()}"
    ${state.fb?'disabled':''}
    style="${state.inputMode==='handwrite'?'font-size:16px;':''}">`;

  if(state.fb) {
    h += `<div style="padding:14px 18px;border-radius:14px;margin-bottom:14px;background:${state.fb.ok?'rgba(46,213,115,0.06)':'rgba(255,107,107,0.06)'};border:1px solid ${state.fb.ok?'rgba(46,213,115,0.2)':'rgba(255,107,107,0.2)'}">
      <div style="font-weight:800;font-size:16px">${state.fb.ok?'🎉 정답! 오답 정복!':'😔 다음에 다시 도전!'}</div>
      ${!state.fb.ok?`<div style="font-size:13px;color:var(--sub);margin-top:4px">정답: <span style="color:var(--green);font-weight:700">${mathDisplay(state.prob.a)}</span></div>`:''}
    </div>`;
  }

  h += `<div class="flex gap-8">`;
  if(!state.fb && !state.hint) h += `<button class="btn btn-gray btn-sm" onclick="state.hint=true;render()">💡 힌트</button>`;
  if(!state.fb) h += `<button class="btn btn-orange" style="flex:1" onclick="submitWrongReview()">제출</button>`;
  else h += `<button class="btn btn-orange" style="flex:1" onclick="nextWrongReview()">${idx+1>=total?'📊 결과':'다음 →'}</button>`;
  h += `</div></div>`;
  return h;
}

function submitWrongReview() {
  if(state.fb) return;
  const userAns = (state.ans||'').trim();
  const normalize = s => s.replace(/\s/g,'').replace(/\+/g,'');
  const isOk = userAns && normalize(userAns) === normalize(state.prob.a);
  state.fb = { ok:isOk };
  if(isOk) state.wrongReviewOk++;
  state.wrongReviewResults.push({ ok:isOk, q:state.prob.q, ua:userAns, ca:state.prob.a });
  render();
}

function nextWrongReview() {
  state.wrongReviewIdx++;
  if(state.wrongReviewIdx >= state.wrongReviewList.length) { render(); return; }
  state.fb = null; state.hint = false; state.ans = '';
  state.canvasHistory = [];
  const item = state.wrongReviewList[state.wrongReviewIdx];
  state.prob = { q:item.q, a:item.ca, h:item.h };
  render();
}

function uploadCSV() {
  const raw = ($('#csv-input')||{}).value;
  if(!raw || !raw.trim()) { $('#csv-result').innerHTML = '<span style="color:var(--accent2)">데이터를 입력하세요.</span>'; return; }
  const lines = raw.trim().split('\n').filter(l=>l.trim());
  const school = getSchool();
  let added = 0, skipped = 0;
  lines.forEach(line => {
    const parts = line.split(/[\t,]/).map(s=>s.trim());
    if(parts.length < 4) { skipped++; return; }
    const [grade,cls,number,name] = parts;
    if(!grade||!cls||!number||!name) { skipped++; return; }
    const exists = school.students.find(s=>s.grade===grade&&s.cls===cls&&s.number===number);
    if(exists) { exists.name=name; skipped++; return; }
    school.students.push({ grade, cls, number, name, pw: DEFAULT_STU_PW });
    added++;
  });
  saveSchool(school);
  $('#csv-result').innerHTML = `<span style="color:var(--green)">✅ ${added}명 추가 완료${skipped>0?` (${skipped}건 건너뜀)`:''}</span>`;
  setTimeout(() => render(), 1000);
}

function loadCSVFile(input) {
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const el = $('#csv-input');
    if(el) el.value = e.target.result;
  };
  reader.readAsText(file);
}

function addOneStudent() {
  const grade=($('#add-grade')||{}).value, cls=($('#add-class')||{}).value;
  const num=($('#add-num')||{}).value, name=($('#add-name')||{}).value;
  if(!grade||!cls||!num||!name) { alert('모든 항목을 입력하세요.'); return; }
  const school = getSchool();
  const exists = school.students.find(s=>s.grade===grade&&s.cls===cls&&s.number===num);
  if(exists) { alert('이미 등록된 학생입니다.'); return; }
  school.students.push({ grade, cls, number:num, name:name.trim(), pw: DEFAULT_STU_PW });
  saveSchool(school);
  render();
}

function removeStudent(g,c,n) {
  if(!confirm('이 학생을 삭제할까요?')) return;
  const school = getSchool();
  school.students = school.students.filter(s=>!(s.grade===g&&s.cls===c&&s.number===n));
  saveSchool(school);
  try { localStorage.removeItem(stuKey(g,c,n)); } catch{}
  render();
}

function updateStudentPw(g,c,n,pw) {
  const school = getSchool();
  const stu = school.students.find(s=>s.grade===g&&s.cls===c&&s.number===n);
  if(stu) { stu.pw = pw; saveSchool(school); }
}

function resetAllPasswords() {
  if(!confirm('모든 학생의 비밀번호를 "'+DEFAULT_STU_PW+'"로 초기화할까요?')) return;
  const school = getSchool();
  school.students.forEach(s => s.pw = DEFAULT_STU_PW);
  saveSchool(school);
  render();
}

    </tr></thead><tbody>`;

  allStudents.sort((a,b)=>b.xp-a.xp).forEach(st => {
    const status = st.streak>=3?{t:'활발',c:'var(--green)'}:st.streak>=1?{t:'보통',c:'var(--gold)'}:{t:'미참여',c:'var(--accent2)'};
    h += `<tr>
      <td>${st.grade}-${st.cls}</td><td style="font-weight:700">${st.name}</td>
      <td><span class="tag" style="background:rgba(108,99,255,0.15);color:var(--accent)">Lv.${st.level}</span></td>
      <td style="color:var(--gold)">⚡${st.xp}</td><td>${st.total}</td>
      <td style="color:${st.acc>=80?'var(--green)':st.acc>=60?'var(--gold)':'var(--accent2)'}">${st.acc}%</td>
      <td>🔥${st.streak}일</td><td style="color:var(--accent2)">${st.wrongs}</td>
      <td style="font-size:10px;color:var(--sub)">${st.lastDate||'-'}</td>
      <td><span class="tag" style="background:${status.c}22;color:${status.c}">${status.t}</span></td>
    </tr>`;
  });
  h += `</tbody></table></div></div>`;

  h += `<div class="card"><h3 style="font-size:16px;font-weight:800;margin-bottom:14px">📊 모듈별 참여 현황</h3>`;
  const maxMod = Math.max(...MODULES.map(m => allStudents.reduce((s,st)=>s+(st.modSolved[m.id]||0),0)), 1);
  MODULES.forEach(m => {
    const total = allStudents.reduce((s,st)=>s+(st.modSolved[m.id]||0),0);
    h += `<div style="margin-bottom:12px"><div class="flex justify-between mb-4"><span style="font-size:12px;font-weight:600">${m.icon} ${m.name}</span><span style="font-size:11px;color:var(--sub)">총 ${total}문제</span></div>
      <div class="pbar" style="height:12px;border-radius:6px"><div class="pfill" style="width:${total/maxMod*100}%;background:linear-gradient(90deg,${m.color},${m.color}88);border-radius:6px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:700">${total>0?total:''}</div></div></div>`;
  });
  h += `</div>`;

  // AI 추천
  const weakStudents = allStudents.filter(s=>s.acc<70&&s.total>=10).sort((a,b)=>a.acc-b.acc);
  const lowMods = MODULES.map(m=>({...m, total:allStudents.reduce((s,st)=>s+(st.modSolved[m.id]||0),0)})).sort((a,b)=>a.total-b.total);
  h += `<div class="card" style="background:rgba(108,99,255,0.04);border:1px solid rgba(108,99,255,0.15)">
    <h3 style="font-size:14px;font-weight:700;margin-bottom:8px;color:var(--accent)">💡 AI 분석 & 추천</h3>
    <div style="font-size:13px;color:var(--sub);line-height:1.8">`;
  if(weakStudents.length>0) h += `• <strong style="color:var(--accent2)">${weakStudents.map(s=>s.name).join(', ')}</strong> 학생의 정확도가 70% 미만입니다.<br>`;
  if(lowMods.length>0) h += `• 참여율 최저 모듈: <strong style="color:${lowMods[0].color}">${lowMods[0].name}</strong> (${lowMods[0].total}문제)<br>`;
  const highStreaks = allStudents.filter(s=>s.streak>=5);
  if(highStreaks.length>0) h += `• <strong style="color:var(--green)">${highStreaks.map(s=>s.name).join(', ')}</strong>의 연속 학습 우수!<br>`;
  if(allStudents.length>0 && totalSolved===0) h += `• 아직 학습을 시작한 학생이 없습니다. 수업 시간에 활용해보세요!<br>`;
  h += `</div></div>`;

  return h;
}

// ── 관리자 랭킹 ──
function renderAdminRank() {
  const all = getAllStudentData().sort((a,b)=>b.xp-a.xp);
  let h = `<div class="card">
    <div class="flex justify-between items-center mb-16">
      <h2 style="font-size:18px;font-weight:800;margin:0">🏆 전체 랭킹</h2>
      <button class="btn btn-orange btn-sm no-print" onclick="window.print()">🖨️ 인쇄</button>
    </div>`;
  if(all.length===0) {
    h += `<div class="text-center" style="padding:30px;color:var(--sub)">등록된 학생이 없습니다.</div>`;
  } else {
    all.forEach((e,i) => {
      const colors = ['var(--gold)','#C0C0C0','#CD7F32'];
      h += `<div class="flex items-center gap-10" style="padding:10px 14px;border-radius:12px;margin-bottom:6px;background:rgba(255,255,255,0.02)">
        <div style="width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;background:${i<3?colors[i]+'22':'rgba(255,255,255,0.04)'};color:${i<3?colors[i]:'var(--sub)'}">${i<3?['🥇','🥈','🥉'][i]:i+1}</div>
        <div style="flex:1"><span style="font-weight:600;font-size:13px">${e.grade}-${e.cls} ${e.name}</span></div>
        <span style="font-size:10px;color:var(--sub)">${e.total}문제 · ${e.acc}%</span>
        <span style="font-size:10px;color:var(--sub)">Lv.${e.level}</span>
        <span style="font-weight:800;color:var(--gold);font-size:13px">⚡${e.xp.toLocaleString()}</span>
      </div>`;
    });
  }
  h += `</div>`;
  return h;
}

// ═══════════════════════════════════════════════════════════
// ✏️ 손글씨 캔버스 (터치 + 마우스 지원)
// ═══════════════════════════════════════════════════════════
let drawCtx = null;
let isDrawing = false;
let lastX = 0, lastY = 0;

function initCanvas() {
  const canvas = $('#draw-canvas');
  if(!canvas) return;
  drawCtx = canvas.getContext('2d');

  // 캔버스 해상도를 실제 크기에 맞춤
  const rect = canvas.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.height = '280px';
  drawCtx.scale(dpr, dpr);

  // 부드러운 선
  drawCtx.lineCap = 'round';
  drawCtx.lineJoin = 'round';

  // 이전 그림 복원
  restoreCanvas();

  // 이벤트 등록
  canvas.onmousedown = e => startDraw(e, false);
  canvas.onmousemove = e => doDraw(e, false);
  canvas.onmouseup = stopDraw;
  canvas.onmouseleave = stopDraw;

  canvas.ontouchstart = e => { e.preventDefault(); startDraw(e, true); };
  canvas.ontouchmove = e => { e.preventDefault(); doDraw(e, true); };
  canvas.ontouchend = stopDraw;
  canvas.ontouchcancel = stopDraw;
}

function getPos(e, isTouch) {
  const canvas = $('#draw-canvas');
  if(!canvas) return {x:0,y:0};
  const rect = canvas.getBoundingClientRect();
  if(isTouch) {
    const t = e.touches[0];
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e, isTouch) {
  isDrawing = true;
  const pos = getPos(e, isTouch);
  lastX = pos.x;
  lastY = pos.y;

  // 히스토리 저장
  saveCanvasState();

  // 캔버스 활성화 표시
  const wrap = $('#canvas-wrap');
  if(wrap) wrap.classList.add('active');
}

function doDraw(e, isTouch) {
  if(!isDrawing || !drawCtx) return;
  const pos = getPos(e, isTouch);

  drawCtx.beginPath();
  if(state.isEraser) {
    drawCtx.globalCompositeOperation = 'destination-out';
    drawCtx.lineWidth = state.penSize * 5;
  } else {
    drawCtx.globalCompositeOperation = 'source-over';
    drawCtx.strokeStyle = state.penColor;
    drawCtx.lineWidth = state.penSize;
  }
  drawCtx.moveTo(lastX, lastY);
  drawCtx.lineTo(pos.x, pos.y);
  drawCtx.stroke();

  lastX = pos.x;
  lastY = pos.y;
}

function stopDraw() {
  isDrawing = false;
  const wrap = $('#canvas-wrap');
  if(wrap) wrap.classList.remove('active');
}

function switchInputMode(mode) {
  state.inputMode = mode;
  state.canvasHistory = [];
  render();
}

function setPen(size, eraser) {
  state.penSize = size;
  state.isEraser = false;
  render();
}

function setPenColor(color) {
  state.penColor = color;
  state.isEraser = false;
  render();
}

function toggleEraser() {
  state.isEraser = !state.isEraser;
  render();
}

function saveCanvasState() {
  const canvas = $('#draw-canvas');
  if(!canvas) return;
  state.canvasHistory.push(canvas.toDataURL());
  if(state.canvasHistory.length > 30) state.canvasHistory.shift();
}

function restoreCanvas() {
  if(state.canvasHistory.length === 0 || !drawCtx) return;
  const last = state.canvasHistory[state.canvasHistory.length - 1];
  const img = new Image();
  img.onload = () => {
    const canvas = $('#draw-canvas');
    if(!canvas) return;
    const rect = canvas.getBoundingClientRect();
    drawCtx.clearRect(0, 0, rect.width, rect.height);
    drawCtx.drawImage(img, 0, 0, rect.width, rect.height);
  };
  img.src = last;
}

function undoCanvas() {
  if(state.canvasHistory.length > 0) {
    state.canvasHistory.pop();
  }
  const canvas = $('#draw-canvas');
  if(!canvas || !drawCtx) return;
  const rect = canvas.getBoundingClientRect();
  drawCtx.clearRect(0, 0, rect.width, rect.height);
  if(state.canvasHistory.length > 0) {
    const last = state.canvasHistory[state.canvasHistory.length - 1];
    const img = new Image();
    img.onload = () => {
      drawCtx.drawImage(img, 0, 0, rect.width, rect.height);
    };
    img.src = last;
  }
}

function clearCanvas() {
  const canvas = $('#draw-canvas');
  if(!canvas || !drawCtx) return;
  const rect = canvas.getBoundingClientRect();
  saveCanvasState();
  drawCtx.clearRect(0, 0, rect.width, rect.height);
  state.canvasHistory = [];
}

// ── 초기화 ──
function init() {
  state.loggedIn = false;
  state.view = 'login';
  render();
}

init();
</script>
